name: Update update.json

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build update metadata
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          set -euo pipefail

          version_name="${TAG_NAME#v}"
          version_code="$(echo "${TAG_NAME}" | sed 's/[^0-9]//g')"
          if [ -z "${version_code}" ]; then
            version_code="${{ github.run_number }}"
          fi

          apk_url="$(jq -r '.release.assets[]? | select(.name | test("\\.apk$")) | .browser_download_url' "$GITHUB_EVENT_PATH" | head -n1)"
          if [ -z "${apk_url}" ] || [ "${apk_url}" = "null" ]; then
            apk_url="$(jq -r '.release.html_url' "$GITHUB_EVENT_PATH")"
          fi

          jq -n \
            --argjson versionCode "${version_code}" \
            --arg versionName "${version_name}" \
            --arg updateLog "${RELEASE_BODY}" \
            --arg apkUrl "${apk_url}" \
            --argjson forceUpdate false \
            '{
              versionCode: $versionCode,
              versionName: $versionName,
              updateLog: $updateLog,
              apkUrl: $apkUrl,
              forceUpdate: $forceUpdate
            }' > update.json

      - name: Commit update.json
        run: |
          set -euo pipefail
          if git diff --quiet -- update.json; then
            echo "No update to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "chore: update update.json for ${GITHUB_REF_NAME}"
          git push
