name: Build Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.2.3). Leave empty to use versionName."
        required: false
        type: string

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure Gradle Wrapper exists
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew not found, generating wrapper..."
            gradle wrapper --gradle-version 9.5.1
            chmod +x ./gradlew
          else
            chmod +x ./gradlew
            echo "gradlew found, making executable..."
          fi

      - name: Determine Release Version
        id: release_version
        env:
          INPUT_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || '' }}
        run: |
          set -euo pipefail
          input_tag="$(echo "${INPUT_TAG_NAME}" | xargs)"

          if [ -n "${input_tag}" ]; then
            if [[ "${input_tag}" != v* ]]; then
              input_tag="v${input_tag}"
            fi
            tag_name="${input_tag}"
            version_name="${tag_name#v}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag_name="${GITHUB_REF_NAME}"
            version_name="${tag_name#v}"
          else
            version_name="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)"
            if [ -z "${version_name}" ]; then
              echo "Failed to read versionName from app/build.gradle.kts"
              exit 1
            fi
            tag_name="v${version_name}"
          fi

          # Version code format: MAJOR * 1000000 + MINOR * 1000 + PATCH
          if [[ "${version_name}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            version_code="$((major * 1000000 + minor * 1000 + patch))"
          elif [[ "${version_name}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            version_code="$((major * 1000000 + minor * 1000))"
          elif [[ "${version_name}" =~ ^([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            version_code="$((major * 1000000))"
          else
            echo "Invalid version '${version_name}'. Use X, X.Y or X.Y.Z."
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"

      - name: Update App Version
        env:
          VERSION_NAME: ${{ steps.release_version.outputs.version_name }}
          VERSION_CODE: ${{ steps.release_version.outputs.version_code }}
        run: |
          set -euo pipefail
          perl -i -pe 's/versionCode\s*=\s*\d+/versionCode = '"${VERSION_CODE}"'/' app/build.gradle.kts
          perl -i -pe 's/versionName\s*=\s*"[^"]*"/versionName = "'"${VERSION_NAME}"'"/' app/build.gradle.kts
          grep -Eq "versionCode\\s*=\\s*${VERSION_CODE}" app/build.gradle.kts || {
            echo "Failed to update versionCode to ${VERSION_CODE} in app/build.gradle.kts"
            exit 1
          }
          grep -Eq "versionName\\s*=\\s*\"${VERSION_NAME}\"" app/build.gradle.kts || {
            echo "Failed to update versionName to ${VERSION_NAME} in app/build.gradle.kts"
            exit 1
          }
          echo "Updated app/build.gradle.kts to versionName=${VERSION_NAME}, versionCode=${VERSION_CODE}"

      - name: Create Keystore File
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_FILE="${{ github.workspace }}/my-upload-key.jks"
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore from secret..."
            echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
          else
            echo "No keystore secret found, creating debug keystore..."
            keytool -genkey -v -keystore "$KEYSTORE_FILE" \
              -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename and Prepare APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/com.hade.chitieushipper_${{ steps.release_version.outputs.version_name }}.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/com.hade.chitieushipper_${{ steps.release_version.outputs.version_name }}.apk
          tag_name: ${{ steps.release_version.outputs.tag_name }}
          name: Release ${{ steps.release_version.outputs.version_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger update-json workflow
        uses: actions/github-script@v7
        env:
          DISPATCH_REF: ${{ github.event.repository.default_branch }}
          TAG_NAME: ${{ steps.release_version.outputs.tag_name }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "update-json.yml",
              ref: process.env.DISPATCH_REF,
              inputs: {
                tag_name: process.env.TAG_NAME
              }
            });

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/com.hade.chitieushipper_${{ steps.release_version.outputs.version_name }}.apk
          retention-days: 30