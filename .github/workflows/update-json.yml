name: Update update.json

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
      release_body:
        description: "Update log content"
        required: false
        type: string
      apk_url:
        description: "Direct APK URL (optional for manual run)"
        required: false
        type: string
      force_update:
        description: "Force update for clients"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build update metadata
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_body || github.event.release.body || '' }}
          INPUT_APK_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apk_url || '' }}
          FORCE_UPDATE_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_update || 'false' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -z "${TAG_NAME}" ]; then
            echo "TAG_NAME is required."
            exit 1
          fi

          version_name="${TAG_NAME#v}"
          # Version code format: MAJOR * 1_000_000 + MINOR * 1_000 + PATCH
          if [[ "${version_name}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            version_code="$((major * 1000000 + minor * 1000 + patch))"
          elif [[ "${version_name}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            version_code="$((major * 1000000 + minor * 1000))"
          elif [[ "${version_name}" =~ ^([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            version_code="$((major * 1000000))"
          else
            echo "Invalid tag format '${TAG_NAME}'. Use vMAJOR.MINOR.PATCH, vMAJOR.MINOR, or vMAJOR."
            exit 1
          fi

          apk_url="${INPUT_APK_URL}"
          if [ -z "${apk_url}" ]; then
            apk_url="$(jq -r '.release.assets[]? | select(.name | test("\\.apk$")) | .browser_download_url' "$GITHUB_EVENT_PATH" | head -n1)"
          fi
          if [ -z "${apk_url}" ] || [ "${apk_url}" = "null" ]; then
            apk_url="$(
              curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" \
                | jq -r '.assets[]? | select(.name | test("\\.apk$")) | .browser_download_url' \
                | head -n1 || true
            )"
          fi
          if [ -z "${apk_url}" ] || [ "${apk_url}" = "null" ]; then
            echo "No APK asset found in this release. Attach at least one .apk file before publishing."
            exit 1
          fi

          jq -n \
            --argjson versionCode "${version_code}" \
            --arg versionName "${version_name}" \
            --arg updateLog "${RELEASE_BODY}" \
            --arg apkUrl "${apk_url}" \
            --arg forceUpdate "${FORCE_UPDATE_INPUT}" \
            '{
              versionCode: $versionCode,
              versionName: $versionName,
              updateLog: $updateLog,
              apkUrl: $apkUrl,
              forceUpdate: ($forceUpdate == "true")
            }' > update.json

      - name: Commit update.json
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- update.json; then
            echo "No update to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "chore: update update.json for ${TAG_NAME}"
          git push
